<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        /* Общие стили из предыдущих примеров */
        body { margin: 0; background: #0E2931; color: #E2E2E0; font-family: 'Segoe UI', sans-serif; }
        
        nav {
            background: #12484C;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2B7574;
        }

        .logo { font-size: 24px; font-weight: bold; color: #E2E2E0; }

        .nav-links a {
            color: #E2E2E0;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-links a.logout { background: #861211; }
        .nav-links a:hover:not(.logout) { color: #2B7574; }

        .hero {
            padding: 100px 50px;
            text-align: center;
        }

        .card {
            background: #12484C;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 15px;
            border-left: 5px solid #861211;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MyBrand</div>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Profile</a>
            <a href="/logout/" class="logout">Logout</a>
        </div>
    </nav>

    <div class="hero">
        <div class="card">
            <h1>Welcome, {{ user.username }}!</h1>
            <p style="margin-top: 20px; color: #2B7574;">You are successfully logged into the system.</p>
        </div>
    </div>
</body>
</html>
