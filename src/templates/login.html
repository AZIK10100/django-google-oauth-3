<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #12484C, #0E2931);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-form {
            background: rgba(18, 72, 76, 0.4);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            color: #E2E2E0;
            border: 1px solid #2B7574;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            color: #E2E2E0;
        }

        .auth-form p {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .auth-form label {
            margin-bottom: 8px;
            font-size: 14px;
            color: #2B7574;
            font-weight: bold;
        }

        .auth-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #2B7574;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            background: #0E2931;
            color: #E2E2E0;
        }

        .auth-form input:focus {
            border-color: #E2E2E0;
            box-shadow: 0 0 5px #2B7574;
        }

        .errorlist {
            color: #861211;
            font-size: 12px;
            list-style: none;
            margin-bottom: 10px;
            padding: 0;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #861211;
            color: #E2E2E0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #a51816;
            transform: translateY(-2px);
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link a {
            color: #2B7574;
            font-weight: bold;
            text-decoration: none;
        }

        .link a:hover {
            color: #E2E2E0;
            text-decoration: underline;
        }

        /* Стили для социальной авторизации */
        .social-login {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(43, 117, 116, 0.3);
            text-align: center;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background: #E2E2E0;
            /* Светлый фон для контраста */
            color: #0E2931;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .google-btn svg {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <form class="auth-form" method="POST">
            {% csrf_token %}
            <h2>Welcome Back</h2>
            <p>
                <label>Username</label>
                <input type="text" name="username" required>
            </p>
            <p>
                <label>Password</label>
                <input type="password" name="password" required>
            </p>
            <button type="submit">Sign In</button>
            {% load socialaccount %}

            <div class="social-login">
                <a href="{% provider_login_url 'google' %}" class="google-btn">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path
                            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                            fill="#4285F4" />
                        <path
                            d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
                            fill="#34A853" />
                        <path
                            d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.172.282-1.712V4.956H.957C.347 6.173 0 7.548 0 9s.347 2.827.957 4.044l3.007-2.332z"
                            fill="#FBBC05" />
                        <path
                            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.443 2.017.957 4.956L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </a>
            </div>
            <p class="link">New here? <a href="/register/">Create Account</a></p>
        </form>
    </div>
</body>

</html>
